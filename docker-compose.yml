services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: gogoga-dictionary:latest
    container_name: gogoga-dictionary-api
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      DB_PATH: "/app/data/dict.db"
      SCHEMA_PATH: "/app/migrations/schema.sql"
      FEISHU_APP_ID: "${FEISHU_APP_ID}"
      FEISHU_APP_SECRET: "${FEISHU_APP_SECRET}"
      FEISHU_BITABLE_APP_TOKEN: "${FEISHU_BITABLE_APP_TOKEN}"
      FEISHU_BITABLE_TABLE_ID: "${FEISHU_BITABLE_TABLE_ID}"
      QINIU_ACCESS_KEY: "${QINIU_ACCESS_KEY}"
      QINIU_SECRET_KEY: "${QINIU_SECRET_KEY}"
      QINIU_BUCKET: "${QINIU_BUCKET}"
      QINIU_UPLOAD_URL: "${QINIU_UPLOAD_URL}"
      QINIU_PUBLIC_BASE_URL: "${QINIU_PUBLIC_BASE_URL}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  importer:
    image: gogoga-dictionary:latest
    container_name: gogoga-dictionary-importer
    command: ["importer", "-csv", "/app/datasets/ecdict.csv", "-db", "/app/data/dict.db", "-schema", "/app/migrations/schema.sql"]
    environment:
      DB_PATH: "/app/data/dict.db"
      SCHEMA_PATH: "/app/migrations/schema.sql"
    volumes:
      - ./data:/app/data
      - ./datasets:/app/datasets:ro
    profiles: ["tools"]
